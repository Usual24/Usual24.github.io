<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 블로그</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: white;
            padding: 1em;
            text-align: center;
        }
        .content {
            width: 80%;
            margin: 0 auto;
            padding: 20px;
        }
        .post {
            background-color: white;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        .post-title {
            font-size: 1.8em;
            margin-bottom: 10px;
        }
        .post-date {
            color: gray;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        .post-content {
            font-size: 1.2em;
        }
        .new-post {
            position: fixed;  /* 화면에 고정 */
            top: 20px;        /* 상단에서 20px 떨어짐 */
            right: 20px;      /* 오른쪽에서 20px 떨어짐 */
            background-color: #333;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        .new-post:hover {
            background-color: #555;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: red;
            color: white;
            border: none;
            padding: 5px;
            cursor: pointer;
            border-radius: 3px;
        }
        .delete-btn:hover {
            background-color: darkred;
        }
        .delete-dialog {
            background-color: rgba(0, 0, 0, 0.5);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            display: none;
        }
        .delete-dialog-content {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }
        .delete-dialog input {
            width: 80%;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>나만의 블로그</h1>
    </header>
    <div class="content">
        <div id="posts">
            <!-- 여기에 게시글들이 추가될 거야 -->
        </div>
    </div>

    <div class="new-post" onclick="createNewPost()">새 글 작성하기</div>

    <div id="newPostForm" style="display: none;">
        <div class="content">
            <h2>새 글 작성</h2>
            <form id="postForm">
                <input type="text" id="postTitle" placeholder="글 제목" required><br><br>
                <textarea id="postContent" rows="4" placeholder="글 내용" required></textarea><br><br>
                <input type="password" id="deletePassword" placeholder="삭제 비밀번호 설정" required><br><br>
                <button type="submit">글 저장</button>
                <button type="button" onclick="cancelPost()">취소</button>
            </form>
        </div>
    </div>

    <div class="delete-dialog" id="deleteDialog">
        <div class="delete-dialog-content">
            <h3>삭제 비밀번호 입력</h3>
            <input type="password" id="deletePasswordInput" placeholder="삭제 비밀번호" required><br>
            <button onclick="confirmDelete()">삭제</button>
            <button onclick="cancelDelete()">취소</button>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "admin123";  // 관리자 비밀번호 설정

        // 로컬 스토리지에서 글을 불러오고 새 글을 저장하는 함수
        function getPosts() {
            const posts = JSON.parse(localStorage.getItem("posts"));
            return posts ? posts : [];
        }

        function savePosts(posts) {
            localStorage.setItem("posts", JSON.stringify(posts));
        }

        // 블로그 글을 화면에 표시
        function displayPosts() {
            const posts = getPosts();
            const postContainer = document.getElementById("posts");
            postContainer.innerHTML = '';

            posts.forEach((post, index) => {
                const postElement = document.createElement("div");
                postElement.classList.add("post");

                postElement.innerHTML = `
                    <h2 class="post-title">${post.title}</h2>
                    <p class="post-date">${post.date}</p>
                    <p class="post-content">${post.content}</p>
                    <button class="delete-btn" onclick="openDeleteDialog(${index})">삭제</button>
                `;
                postContainer.appendChild(postElement);
            });
        }

        // 새 글 작성 폼 표시
        function createNewPost() {
            document.getElementById('newPostForm').style.display = 'block';
        }

        // 새 글 작성 취소
        function cancelPost() {
            document.getElementById('newPostForm').style.display = 'none';
        }

        // 글 저장 처리
        document.getElementById("postForm").addEventListener("submit", function(event) {
            event.preventDefault();

            const title = document.getElementById("postTitle").value;
            const content = document.getElementById("postContent").value;
            const date = new Date().toLocaleString();
            const deletePassword = document.getElementById("deletePassword").value;

            const newPost = {
                title: title,
                content: content,
                date: date,
                deletePassword: deletePassword // 삭제 비밀번호 저장
            };

            const posts = getPosts();
            posts.push(newPost);
            savePosts(posts);

            displayPosts();
            document.getElementById("postTitle").value = '';
            document.getElementById("postContent").value = '';
            document.getElementById("deletePassword").value = '';
            cancelPost();
        });

        // 글 삭제 처리
        function openDeleteDialog(index) {
            const deleteDialog = document.getElementById("deleteDialog");
            deleteDialog.style.display = 'flex';
            window.deleteIndex = index;  // 삭제할 글의 인덱스를 저장
        }

        function confirmDelete() {
            const deletePasswordInput = document.getElementById("deletePasswordInput").value;
            const posts = getPosts();
            const post = posts[window.deleteIndex];

            // 관리자가 입력한 경우
            if (deletePasswordInput === ADMIN_PASSWORD) {
                posts.splice(window.deleteIndex, 1);
                savePosts(posts);
                displayPosts();
                cancelDelete();
                return;
            }

            // 사용자가 입력한 비밀번호가 해당 글의 비밀번호와 일치하는 경우
            if (deletePasswordInput === post.deletePassword) {
                posts.splice(window.deleteIndex, 1);
                savePosts(posts);
                displayPosts();
                cancelDelete();
            } else {
                alert("비밀번호가 일치하지 않습니다.");
            }
        }

        function cancelDelete() {
            document.getElementById("deleteDialog").style.display = 'none';
            document.getElementById("deletePasswordInput").value = ''; // 비밀번호 입력 필드 초기화
        }

        // 페이지 로드 시 기존 게시글들 표시
        displayPosts();
    </script>
</body>
</html>
